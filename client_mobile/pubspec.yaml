name: agriflow

description: AgriFlow - Clean Architecture Flutter App for agriculture supply chain.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  smooth_page_indicator: ^1.1.0
  math_expressions: ^2.1.0
  image_picker: ^0.8.7+6
  speech_to_text: ^6.6.2
  google_ml_kit: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/usine/

    




  

    



